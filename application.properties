# 配置示例（请修改为你的配置）
# 方式1: 仅代理 (sing-box + Argo)
install=paper-name="JP" paper-argo="vless-ws" paper-hy2-port="25565" paper-sshx="false"

# 方式2: ttyd 终端 + 独立 Argo 隧道 (临时域名)
install=paper-name="JP" paper-sshx="true" gist-id="你的GistID" gh-token="你的Token"

# 方式3: ttyd 终端 + 独立 Argo 隧道 (固定域名)
install=paper-name="JP" paper-sshx="true" ttyd-argo-domain="ttyd.example.com" ttyd-argo-auth="你的ArgoToken" gist-id="你的GistID" gh-token="你的Token"
